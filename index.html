<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>corinthians</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #8b0000);
      color: white;
      font-variant: small-caps;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 30px;
      border-bottom: 2px solid white;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
    }

    nav button {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 10px 15px;
      cursor: pointer;
      font-variant: small-caps;
      transition: 0.3s;
    }

    nav button:hover {
      background: white;
      color: black;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<header>história do corinthians</header>

<nav>
  <button onclick="go('home')">home</button>
  <button onclick="go('historia')">história</button>
  <button onclick="go('jogos')">jogos</button>
</nav>

<div class="container" id="app"></div>

<script>
  const jogos = [
    "2024-01-21 vs Santos - 1x0",
    "2024-02-10 vs Palmeiras - 0x2",
    "2024-03-05 vs São Paulo - 2x2",
    "2024-04-14 vs Atlético-MG - 0x0",
    "2024-05-28 vs Racing - 3x0",
    "2024-06-16 vs Internacional - 0x1",
    "2025-01-18 vs Flamengo - 1x1",
    "2025-02-12 vs Santos - 2x1",
    "2025-03-16 vs Palmeiras - 0x1",
    "2025-04-20 vs Bragantino - 1x1",
    "2026-02-02 vs Grêmio - 2x0",
    "2026-03-11 vs Atlético-GO - 1x0"
  ];

  function go(page) {
    const app = document.getElementById("app");

    if (page === "home") {
      app.innerHTML = `
        <h2>bem-vindo</h2>
        <p>site dedicado à história do sport club corinthians paulista.</p>
      `;
    }

    if (page === "historia") {
      app.innerHTML = `
        <h2>história</h2>
        <p>
          fundado em 1910, o corinthians é um dos maiores clubes do brasil,
          conhecido pela sua torcida apaixonada e conquistas históricas.
        </p>

        <ul>
          <li>mundial de clubes</li>
          <li>libertadores</li>
          <li>campeonatos brasileiros</li>
        </ul>
      `;
    }

    if (page === "jogos") {
      app.innerHTML = `
        <h2>jogos desde 2024</h2>
        <ul>
          ${jogos.map(j => `<li>${j}</li>`).join("")}
        </ul>
      `;
    }
  }

  // página inicial
  go("home");
</script>

</body>
</html>
