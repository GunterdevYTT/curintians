<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>corinthians - história</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #8b0000);
    color: white;
    font-variant: small-caps;
  }

  header {
    padding: 25px;
    text-align: center;
    font-size: 34px;
    border-bottom: 2px solid rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    flex-wrap: wrap;
  }

  nav button {
    background: rgba(0,0,0,0.4);
    border: 1px solid white;
    color: white;
    padding: 10px 18px;
    cursor: pointer;
    transition: 0.3s;
    font-variant: small-caps;
  }

  nav button:hover {
    background: white;
    color: black;
    transform: scale(1.05);
  }

  .container {
    max-width: 1000px;
    margin: auto;
    padding: 25px;
    animation: fade 0.3s ease-in-out;
  }

  @keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }

  h2 {
    border-left: 4px solid white;
    padding-left: 10px;
  }

  ul {
    line-height: 1.8;
  }

  .card {
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    margin-top: 10px;
  }
</style>
</head>

<body>

<header>sport club corinthians paulista</header>

<nav>
  <button onclick="go('home')">/home</button>
  <button onclick="go('historia')">/historia</button>
  <button onclick="go('jogos')">/jogos</button>
</nav>

<div class="container" id="app"></div>

<script>
const jogos = [
  "2024-01-20 | Corinthians 2x1 Santos",
  "2024-02-02 | Corinthians 0x0 Palmeiras",
  "2024-02-15 | Corinthians 1x1 São Paulo",
  "2024-03-03 | Corinthians 3x0 Bragantino",
  "2024-03-18 | Corinthians 0x2 Flamengo",
  "2024-04-05 | Corinthians 1x0 Internacional",
  "2024-04-14 | Corinthians 0x0 Atlético-MG",
  "2024-05-01 | Corinthians 2x2 Cruzeiro",
  "2024-05-28 | Corinthians 3x0 Racing",
  "2024-06-10 | Corinthians 1x1 Fluminense",
  "2024-06-16 | Corinthians 0x1 São Paulo",
  "2024-07-02 | Corinthians 2x0 Vasco",
  "2024-08-11 | Corinthians 1x2 Palmeiras",
  "2024-09-19 | Corinthians 2x1 Grêmio",
  "2024-10-03 | Corinthians 0x0 Botafogo",

  "2025-01-12 | Corinthians 1x0 Santos",
  "2025-02-02 | Corinthians 2x2 São Paulo",
  "2025-02-23 | Corinthians 1x0 Palmeiras",
  "2025-03-16 | Corinthians 0x1 Flamengo",
  "2025-04-20 | Corinthians 1x1 Bragantino",
  "2025-05-10 | Corinthians 3x1 Internacional",
  "2025-06-01 | Corinthians 2x0 Atlético-MG",
  "2025-07-14 | Corinthians 0x0 Fluminense",
  "2025-08-22 | Corinthians 2x1 Cruzeiro",

  "2026-01-18 | Corinthians 1x1 Santos",
  "2026-02-02 | Corinthians 2x0 Grêmio",
  "2026-03-11 | Corinthians 1x0 Atlético-GO",
  "2026-04-05 | Corinthians 3x2 Palmeiras"
];

function go(page) {
  const app = document.getElementById("app");

  if (page === "home") {
    app.innerHTML = `
      <h2>home</h2>
      <div class="card">
        bem-vindo ao portal do corinthians.<br><br>
        aqui você encontra a história completa do clube e seus jogos recentes.
      </div>
    `;
  }

  if (page === "historia") {
    app.innerHTML = `
      <h2>história completa</h2>

      <div class="card">
        fundado em 1º de setembro de 1910 por operários do bairro do bom retiro, 
        o sport club corinthians paulista nasceu como um clube do povo.
      </div>

      <div class="card">
        ao longo do século xx, o clube se consolidou como uma das maiores forças do futebol brasileiro, 
        com uma das torcidas mais apaixonadas do mundo.
      </div>

      <div class="card">
        conquistas principais:
        <ul>
          <li>campeonato mundial de clubes (2000, 2012)</li>
          <li>copa libertadores da américa (2012)</li>
          <li>campeonatos brasileiros (vários títulos)</li>
          <li>copas do brasil</li>
          <li>campeonatos paulistas</li>
        </ul>
      </div>

      <div class="card">
        o corinthians também é conhecido por sua identidade popular, 
        sua torcida organizada e sua influência cultural no brasil.
      </div>
    `;
  }

  if (page === "jogos") {
    app.innerHTML = `
      <h2>jogos (2024 - 2026)</h2>
      <div class="card">
        <ul>
          ${jogos.map(j => `<li>${j}</li>`).join("")}
        </ul>
      </div>
    `;
  }
}

go("home");
</script>

</body>
</html>
