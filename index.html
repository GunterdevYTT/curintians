<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>corinthians</title>

<!-- fonte moderna -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: #ffffff;
    color: #111;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 20px;
    border-bottom: 2px solid #eee;
  }

  header img {
    width: 55px;
    height: 55px;
  }

  header h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    border-bottom: 1px solid #eee;
  }

  nav button {
    background: #111;
    color: white;
    border: none;
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: 600;
  }

  nav button:hover {
    background: #444;
  }

  .container {
    max-width: 1000px;
    margin: auto;
    padding: 25px;
  }

  .card {
    background: #f7f7f7;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
  }

  ul {
    line-height: 1.8;
  }

  .path {
    text-align: center;
    font-family: monospace;
    color: #666;
    margin-top: 5px;
  }
</style>
</head>

<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/pt/b/b4/Corinthians_simbolo.png" alt="logo">
  <h1>sport club corinthians paulista</h1>
</header>

<div class="path" id="path">/home</div>

<nav>
  <button onclick="go('home')">home</button>
  <button onclick="go('historia')">história</button>
  <button onclick="go('jogos')">jogos</button>
</nav>

<div class="container" id="app"></div>

<script>
const jogos = [
  // 2024
  "2024-01-21 | Corinthians 2x1 Santos",
  "2024-02-02 | Corinthians 0x0 Palmeiras",
  "2024-02-15 | Corinthians 1x1 São Paulo",
  "2024-03-03 | Corinthians 3x0 Bragantino",
  "2024-03-18 | Corinthians 0x2 Flamengo",
  "2024-04-05 | Corinthians 1x0 Internacional",
  "2024-04-14 | Corinthians 0x0 Atlético-MG",
  "2024-05-01 | Corinthians 2x2 Cruzeiro",
  "2024-05-28 | Corinthians 3x0 Racing",
  "2024-06-10 | Corinthians 1x1 Fluminense",
  "2024-06-16 | Corinthians 0x1 São Paulo",
  "2024-07-02 | Corinthians 2x0 Vasco",
  "2024-08-11 | Corinthians 1x2 Palmeiras",
  "2024-09-19 | Corinthians 2x1 Grêmio",
  "2024-10-03 | Corinthians 0x0 Botafogo",
  "2024-11-12 | Corinthians 1x0 Bahia",

  // 2025
  "2025-01-12 | Corinthians 1x0 Santos",
  "2025-02-02 | Corinthians 2x2 São Paulo",
  "2025-02-23 | Corinthians 1x0 Palmeiras",
  "2025-03-16 | Corinthians 0x1 Flamengo",
  "2025-04-20 | Corinthians 1x1 Bragantino",
  "2025-05-10 | Corinthians 3x1 Internacional",
  "2025-06-01 | Corinthians 2x0 Atlético-MG",
  "2025-07-14 | Corinthians 0x0 Fluminense",
  "2025-08-22 | Corinthians 2x1 Cruzeiro",
  "2025-09-09 | Corinthians 1x1 Grêmio",
  "2025-10-18 | Corinthians 2x0 Vasco",

  // 2026
  "2026-01-18 | Corinthians 1x1 Santos",
  "2026-02-02 | Corinthians 2x0 Grêmio",
  "2026-03-11 | Corinthians 1x0 Atlético-GO",
  "2026-04-05 | Corinthians 3x2 Palmeiras",
  "2026-05-20 | Corinthians 2x1 Flamengo"
];

function go(page) {
  const app = document.getElementById("app");
  const path = document.getElementById("path");

  if (page === "home") {
    path.innerText = "/home";

    app.innerHTML = `
      <div class="card">
        bem-vindo ao portal oficial do sport club corinthians paulista.<br><br>
        aqui você encontra informações históricas completas e todos os jogos recentes organizados por temporada.
      </div>
    `;
  }

  if (page === "historia") {
    path.innerText = "/historia";

    app.innerHTML = `
      <div class="card">
        fundado em 1º de setembro de 1910 no bairro do bom retiro, em são paulo, 
        por um grupo de operários inspirados por clubes ingleses, o sport club corinthians paulista 
        nasceu com a missão de ser um clube do povo.
      </div>

      <div class="card">
        ao longo de sua história, o corinthians se tornou um dos clubes mais populares e vitoriosos do brasil, 
        construindo uma identidade marcada pela paixão de sua torcida e pela força em momentos decisivos.
      </div>

      <div class="card">
        o clube conquistou títulos de enorme importância nacional e internacional, incluindo:
        <ul>
          <li>copa libertadores da américa (2012)</li>
          <li>mundial de clubes da fifa (2000 e 2012)</li>
          <li>campeonatos brasileiros</li>
          <li>copas do brasil</li>
          <li>inúmeros campeonatos paulistas</li>
        </ul>
      </div>

      <div class="card">
        além dos títulos, o corinthians é conhecido por sua forte ligação com a cultura popular brasileira, 
        sendo considerado um símbolo de resistência, paixão e identidade do povo.
      </div>
    `;
  }

  if (page === "jogos") {
    path.innerText = "/jogos";

    app.innerHTML = `
      <div class="card">
        <ul>
          ${jogos.map(j => `<li>${j}</li>`).join("")}
        </ul>
      </div>
    `;
  }
}

go("home");
</script>

</body>
</html>
